openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ELFOR LED Store API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Product categories
  - name: products
    description: Products catalog
  - name: articles
    description: News and articles
  - name: orders
    description: Customer orders
  - name: stats
    description: Dashboard statistics
  - name: storage
    description: Object storage upload and serving endpoints
  - name: catalog
    description: Downloadable product catalog management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ===== CATEGORIES =====
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get a category by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryPatch"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ===== PRODUCTS =====
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with optional filters
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: featured
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/featured:
    get:
      operationId: listFeaturedProducts
      tags: [products]
      summary: List featured products for homepage
      responses:
        "200":
          description: Featured products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductPatch"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ===== ARTICLES =====
  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List articles/news
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [news, article]
        - name: published
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"
    post:
      operationId: createArticle
      tags: [articles]
      summary: Create an article/news (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"

  /articles/{id}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get an article by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Not found
    patch:
      operationId: updateArticle
      tags: [articles]
      summary: Update an article (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticlePatch"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Not found
    delete:
      operationId: deleteArticle
      tags: [articles]
      summary: Delete an article (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  # ===== ORDERS =====
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [new, processing, shipped, delivered, cancelled, archive]
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order (customer)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}/send-invoice:
    post:
      operationId: sendInvoice
      tags: [orders]
      summary: Send invoice email to customer (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice sent
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string
        "404":
          description: Not found
        "500":
          description: Email error

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update order status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderPatch"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found

  # ===== CALC REQUESTS =====
  /calc-requests:
    post:
      operationId: createCalcRequest
      tags: [calc-requests]
      summary: Submit a free lighting calculation request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalcRequestInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalcRequest"
        "400":
          description: Bad request
    get:
      operationId: listCalcRequests
      tags: [calc-requests]
      summary: List all calculation requests (admin)
      responses:
        "200":
          description: List of calc requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalcRequest"

  /calc-requests/{id}/status:
    patch:
      operationId: updateCalcRequestStatus
      tags: [calc-requests]
      summary: Update status of a calc request
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalcRequestStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalcRequest"
        "404":
          description: Not found

  # ===== STATS =====
  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get admin dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ===== CATEGORY =====
    Category:
      type: object
      required: [id, name, slug, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        sortOrder:
          type: integer
        createdAt:
          type: string

    CategoryInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        description:
          type: string
        imageUrl:
          type: string
        sortOrder:
          type: integer

    CategoryPatch:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        sortOrder:
          type: integer

    # ===== PRODUCT =====
    PriceTier:
      type: object
      required: [minQty, price]
      properties:
        minQty:
          type: integer
        price:
          type: number

    ProductSpec:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
        value:
          type: string
        unit:
          type: ["string", "null"]

    Product:
      type: object
      required: [id, name, sku, categoryId, price, stock, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        sku:
          type: string
        series:
          type: ["string", "null"]
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        shortDescription:
          type: ["string", "null"]
        fullDescription:
          type: ["string", "null"]
        price:
          type: number
        oldPrice:
          type: ["number", "null"]
        priceTiers:
          type: array
          items:
            $ref: "#/components/schemas/PriceTier"
        specs:
          type: array
          items:
            $ref: "#/components/schemas/ProductSpec"
        imageUrl:
          type: ["string", "null"]
        passportUrl:
          type: ["string", "null"]
        images:
          type: array
          items:
            type: string
        power:
          type: ["string", "null"]
        lumens:
          type: ["integer", "null"]
        colorTemp:
          type: ["string", "null"]
        ipRating:
          type: ["string", "null"]
        warranty:
          type: ["string", "null"]
        colorTemps:
          type: array
          items:
            type: string
        beamAngles:
          type: array
          items:
            type: string
        variantStocks:
          type: array
          items:
            $ref: "#/components/schemas/VariantStock"
        stock:
          type: integer
        featured:
          type: boolean
        inStock:
          type: boolean
        createdAt:
          type: string

    ProductInput:
      type: object
      required: [name, sku, categoryId, price, stock]
      properties:
        name:
          type: string
          minLength: 1
        sku:
          type: string
          minLength: 1
        series:
          type: string
        categoryId:
          type: integer
        shortDescription:
          type: string
        fullDescription:
          type: string
        price:
          type: number
        oldPrice:
          type: number
        priceTiers:
          type: array
          items:
            $ref: "#/components/schemas/PriceTier"
        specs:
          type: array
          items:
            $ref: "#/components/schemas/ProductSpec"
        imageUrl:
          type: string
        passportUrl:
          type: string
        images:
          type: array
          items:
            type: string
        power:
          type: string
        lumens:
          type: integer
        colorTemp:
          type: string
        ipRating:
          type: string
        warranty:
          type: string
        colorTemps:
          type: array
          items:
            type: string
        beamAngles:
          type: array
          items:
            type: string
        variantStocks:
          type: array
          items:
            $ref: "#/components/schemas/VariantStock"
        stock:
          type: integer
        featured:
          type: boolean

    ProductPatch:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        sku:
          type: string
          minLength: 1
        series:
          type: ["string", "null"]
        categoryId:
          type: integer
        shortDescription:
          type: ["string", "null"]
        fullDescription:
          type: ["string", "null"]
        price:
          type: number
        oldPrice:
          type: ["number", "null"]
        priceTiers:
          type: array
          items:
            $ref: "#/components/schemas/PriceTier"
        specs:
          type: array
          items:
            $ref: "#/components/schemas/ProductSpec"
        imageUrl:
          type: ["string", "null"]
        passportUrl:
          type: ["string", "null"]
        images:
          type: array
          items:
            type: string
        power:
          type: ["string", "null"]
        lumens:
          type: ["integer", "null"]
        colorTemp:
          type: ["string", "null"]
        ipRating:
          type: ["string", "null"]
        warranty:
          type: ["string", "null"]
        colorTemps:
          type: array
          items:
            type: string
        beamAngles:
          type: array
          items:
            type: string
        variantStocks:
          type: array
          items:
            $ref: "#/components/schemas/VariantStock"
        stock:
          type: integer
        featured:
          type: boolean
        inStock:
          type: boolean

    VariantStock:
      type: object
      required: [kelvin, stock]
      properties:
        kelvin:
          type: string
        stock:
          type: integer

    # ===== ARTICLE =====
    Article:
      type: object
      required: [id, title, slug, type, published, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        type:
          type: string
          enum: [news, article]
        excerpt:
          type: ["string", "null"]
        content:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        published:
          type: boolean
        publishedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ArticleInput:
      type: object
      required: [title, slug, type]
      properties:
        title:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        type:
          type: string
          enum: [news, article]
        excerpt:
          type: string
        content:
          type: string
        imageUrl:
          type: string
        published:
          type: boolean

    ArticlePatch:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        type:
          type: string
          enum: [news, article]
        excerpt:
          type: ["string", "null"]
        content:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        published:
          type: boolean

    # ===== ORDER =====
    OrderItem:
      type: object
      required: [productId, productName, productSku, quantity, unitPrice]
      properties:
        productId:
          type: integer
        productName:
          type: string
        productSku:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        selectedKelvin:
          type: ["string", "null"]
        selectedAngle:
          type: ["string", "null"]

    Order:
      type: object
      required: [id, customerName, customerPhone, customerEmail, status, totalAmount, items, createdAt]
      properties:
        id:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: string
        customerCompany:
          type: ["string", "null"]
        deliveryAddress:
          type: ["string", "null"]
        comment:
          type: ["string", "null"]
        status:
          type: string
          enum: [new, processing, shipped, delivered, cancelled, archive]
        totalAmount:
          type: number
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
        updatedAt:
          type: string

    OrderInput:
      type: object
      required: [customerName, customerPhone, customerEmail, items]
      properties:
        customerName:
          type: string
          minLength: 1
        customerPhone:
          type: string
          minLength: 1
        customerEmail:
          type: string
          minLength: 1
        customerCompany:
          type: string
        deliveryAddress:
          type: string
        comment:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

    OrderPatch:
      type: object
      properties:
        status:
          type: string
          enum: [new, processing, shipped, delivered, cancelled, archive]
        comment:
          type: ["string", "null"]

    # ===== STORAGE =====
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ===== CATALOG =====
    CatalogInfo:
      type: object
      properties:
        objectPath:
          type: ["string", "null"]
        filename:
          type: ["string", "null"]
        updatedAt:
          type: ["string", "null"]
          format: date-time

    # ===== STATS =====
    DashboardStats:
      type: object
      required: [totalProducts, totalOrders, totalRevenue, newOrdersCount, totalCategories, totalArticles, recentOrders, ordersByStatus, todayOrders, todayRevenue, openChats, ordersLast7Days]

      properties:
        totalProducts:
          type: integer
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        newOrdersCount:
          type: integer
        totalCategories:
          type: integer
        totalArticles:
          type: integer
        todayOrders:
          type: integer
        todayRevenue:
          type: number
        openChats:
          type: integer
        ordersLast7Days:
          type: array
          items:
            type: object
            required: [date, label, count, revenue]
            properties:
              date:
                type: string
              label:
                type: string
              count:
                type: integer
              revenue:
                type: number
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        ordersByStatus:
          type: array
          items:
            type: object
            required: [status, count]
            properties:
              status:
                type: string
              count:
                type: integer

    # ===== CALC REQUESTS =====
    CalcRequest:
      type: object
      required: [id, phone, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: ["string", "null"]
        phone:
          type: string
        productId:
          type: ["integer", "null"]
        productSku:
          type: ["string", "null"]
        productName:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    CalcRequestInput:
      type: object
      required: [phone]
      properties:
        name:
          type: string
        phone:
          type: string
        productId:
          type: integer
        productSku:
          type: string
        productName:
          type: string

    CalcRequestStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
